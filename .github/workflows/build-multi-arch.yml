name: Build Multi-Arch

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            cxx: g++-14
            cc: gcc-14
            arch: x86_64
            deps: g++-14

          - target: linux-aarch64
            cxx: aarch64-linux-gnu-g++-14
            cc: aarch64-linux-gnu-gcc-14
            arch: aarch64
            deps: g++-14-aarch64-linux-gnu

          - target: linux-armv7
            cxx: arm-linux-gnueabihf-g++-14
            cc: arm-linux-gnueabihf-gcc-14
            arch: armv7l
            deps: g++-14-arm-linux-gnueabihf

          - target: linux-i686
            cxx: i686-linux-gnu-g++-14
            cc: i686-linux-gnu-gcc-14
            arch: i686
            deps: g++-14-i686-linux-gnu

    env:
      CXX: ${{ matrix.cxx }}
      CC: ${{ matrix.cc }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y make coreutils sed ${{ matrix.deps }}

      - name: Build
        run: |
          make STATIC=true GPU_SUPPORT=false CXX="${{ matrix.cxx }}" CC="${{ matrix.cc }}" ARCH="${{ matrix.arch }}"

      - name: Rename
        run: mv bin/btop "btop-${{ matrix.target }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: btop-${{ matrix.target }}
          path: btop-${{ matrix.target }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to Release
        run: |
          find artifacts -type f | while read f; do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
